<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conectando ao Google Drive — VIANA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#FAFAF8;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,0.12);padding:36px 40px;max-width:480px;width:90%;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,0.1)}
  .logo{font-size:36px;margin-bottom:10px}
  .brand{font-size:15px;font-weight:500;color:#3C3489;margin-bottom:4px}
  .sub{font-size:12px;color:#8C5A2B;margin-bottom:20px;font-style:italic}
  p{font-size:13px;color:#6B6960;line-height:1.6;margin-bottom:12px}
  .spinner{display:inline-block;width:24px;height:24px;border:2.5px solid #AFA9EC;border-top-color:#3C3489;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status{font-size:13px;padding:10px 14px;border-radius:8px;margin:12px 0;text-align:left}
  .ok{background:#EAF3DE;color:#27500A;border:0.5px solid #8BC34A}
  .err{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595}
  .btn{background:#3C3489;color:#EEEDFE;border:none;border-radius:8px;padding:10px 28px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:10px}
  .btn:hover{background:#26215C}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🎂</div>
  <div class="brand">VIANA — Fábrica de Doces</div>
  <div class="sub">by Thais Fialho</div>
  <div id="content">
    <div class="spinner"></div>
    <p>Processando autorização do Google Drive...</p>
  </div>
</div>

<script>
const content = document.getElementById('content');

// Get the authorization code from the URL (Google redirects here with ?code=...)
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');

if (error) {
  content.innerHTML = `<div class="status err">❌ Acesso negado: ${error}.<br>Feche esta aba e tente novamente.</div>`;
} else if (!code) {
  content.innerHTML = `<div class="status err">Código de autorização não encontrado. Tente novamente.</div>`;
} else {
  // Send the code to the opener window (the gerenciador)
  // The gerenciador will exchange it for tokens using a CORS proxy
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.postMessage({ type: 'DRIVE_CODE', code: code }, '*');
      content.innerHTML = `
        <div class="status ok">✅ Autorização recebida! Conectando ao sistema...</div>
        <p>Esta aba será fechada automaticamente em instantes.</p>`;
      setTimeout(() => window.close(), 2500);
    } catch(e) {
      showCodeManually(code);
    }
  } else {
    showCodeManually(code);
  }
}

function showCodeManually(code) {
  content.innerHTML = `
    <div class="status ok">✅ Autorização concedida pelo Google!</div>
    <p style="margin-top:10px">A janela do gerenciador foi fechada. Copie o código abaixo e cole no sistema manualmente:</p>
    <textarea style="width:100%;height:70px;font-family:monospace;font-size:11px;padding:8px;border-radius:6px;border:1px solid #AFA9EC;margin-top:8px;resize:none">${code}</textarea>
    <button class="btn" onclick="navigator.clipboard.writeText('${code}').then(()=>this.textContent='✅ Copiado!')">Copiar código</button>`;
}
</script>
</body>
</html>
